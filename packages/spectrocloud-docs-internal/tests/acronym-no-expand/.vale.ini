# Points to packages/spectrocloud-docs-internal/styles/ where rule files are located.
StylesPath = ../../styles/ 

# Show all findings, including suggestions. Ensures the test catches everything.
MinAlertLevel = suggestion

# Apply following rules to markdown files only
[*.md]

# Only enable this one rule to isolate the test.
spectrocloud-docs-internal.acronym-no-expand = YES

# Run tests with `make -C <spectro-vale-pkg-repo-location> tests`

# To run individual tests, use `vale --config=<path-to-this-vale-ini-file>`