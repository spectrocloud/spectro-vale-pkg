extends: existence
message: "Consider avoiding '%s' in favor of more inclusive language."
link: "https://spectrocloud.atlassian.net/wiki/x/AQBCaQ"
ignorecase: true
level: error
nonword: true
scope: raw
tokens:
  # The negative lookbehind on '/' skips 'master' when it is part of a URL or file path
  # (for example, '.../blob/master/...') while still flagging it in prose such as 'master node'.
  - '(?<!/)\b(master)\b(?! branch)'
  - '\bslave\b'
